<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Tarot | Junhao Li</title>
    <meta name="description" content="A cyberpunk cat tarot — draw three cards (Past · Present · Future), reversals included, from Junhao Li's portfolio.">

    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tarot.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Pixelify+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="tarot-body">

    <button id="lang-toggle" class="lang-toggle" type="button" aria-label="Switch language">中文</button>

    <nav class="navbar tarot-nav">
        <a class="tarot-back" href="../index.html" data-t="back">← Back</a>
    </nav>

    <main class="tarot-main">
        <header class="tarot-header">
            <h1 class="tarot-title" data-t="title">CAT TAROT</h1>
            <p class="tarot-sub" data-t="sub">A three-card draw from the Glitch City cat deck</p>
            <p class="tarot-intro" data-t="intro">Take a breath, hold your question in mind, then deal the cards. Past · Present · Future — cards may fall reversed.</p>
        </header>

        <div id="controls-initial" class="tarot-controls">
            <button id="deal-btn" class="btn primary big-btn" type="button" data-t="deal">DEAL CARDS</button>
        </div>

        <section id="spread" class="spread" aria-live="polite"></section>

        <div id="controls-result" class="tarot-controls" hidden>
            <p class="tarot-hint" data-t="hint">Click a card to flip it.</p>
            <div class="tarot-controls-row">
                <button id="reveal-btn" class="btn secondary" type="button" data-t="revealAll">REVEAL ALL</button>
                <button id="again-btn" class="btn primary" type="button" data-t="again">DRAW AGAIN</button>
            </div>
        </div>
    </main>

    <footer class="tarot-footer">
        <p>🐱 Cat Tarot · Junhao Li</p>
    </footer>

    <script src="../js/tarot.js"></script>
</body>
</html>
